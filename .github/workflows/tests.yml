name: Tests

on:
  push:
    branches: [master, feature/*]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements_test.txt

      - name: Run tests
        run: pytest tests/ -v
